# Gitleaks configuration for sambaths-site
# Docs: https://github.com/gitleaks/gitleaks#configuration

[allowlist]
  description = "Known false positives for sambaths-site"
  paths = [
    # Test fixtures may contain placeholder secrets
    "(?i)test.*fixture",
    # Lockfile hashes sometimes trigger false positives
    "package-lock.json",
  ]
